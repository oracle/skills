apiVersion: v1
kind: Namespace
metadata:
  name: gva-multihome-test
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: gva-default-network
  namespace: kube-system
spec:
  config: |
    {
      "name": "gva-default-network",
      "cniVersion": "0.3.1",
      "plugins": [
        {
          "cniVersion": "0.3.1",
          "type": "oci-ipvlan",
          "mode": "l2",
          "ipam": {
            "type": "oci-ipam",
            "deviceSelector": {
              "interfaceName": "enp1s0"
            }
          }
        },
        {
          "cniVersion": "0.3.1",
          "type": "oci-ptp",
          "containerInterface": "ptp-veth0",
          "mtu": 9000
        }
      ]
    }
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: gva-secondary-network
  namespace: gva-multihome-test
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "plugins": [
        {
          "type": "ipvlan",
          "mode": "l2",
          "master": "enp2s0",
          "ipam": {
            "type": "oci-ipam",
            "deviceSelector": {
              "interfaceName": "enp2s0"
            }
          }
        }
      ]
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: gva-multihome-a
  namespace: gva-multihome-test
  labels:
    app: gva-multihome
  annotations:
    v1.multus-cni.io/default-network: kube-system/gva-default-network
    k8s.v1.cni.cncf.io/networks: gva-multihome-test/gva-secondary-network
spec:
  nodeName: "node-a"
  containers:
    - name: netshoot
      image: "docker.io/nicolaka/netshoot:v0.13"
      command:
        - sleep
        - "3600"
---
apiVersion: v1
kind: Pod
metadata:
  name: gva-multihome-b
  namespace: gva-multihome-test
  labels:
    app: gva-multihome
  annotations:
    v1.multus-cni.io/default-network: kube-system/gva-default-network
    k8s.v1.cni.cncf.io/networks: gva-multihome-test/gva-secondary-network
spec:
  nodeName: "node-b"
  containers:
    - name: netshoot
      image: "docker.io/nicolaka/netshoot:v0.13"
      command:
        - sleep
        - "3600"
